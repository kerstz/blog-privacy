{% extends 'layout.html' %}

{% block content %}
<h2>Edit Comment</h2>
<form method="POST" action="{{ url_for('edit_comment', comment_id=comment.id, post_id=post.id) }}">
    {{ form.hidden_tag() }}
    <div class="form-group">
        {{ form.content.label }}
        {{ form.content(class="form-control", rows=3) }}
    </div>
    <button type="submit" class="btn btn-primary">Update Comment</button>
</form>
{% endblock %}
