{% extends 'layout.html' %}

{% block content %}
<h2>Manage Premium Users</h2>
<table>
    <tr>
        <th>Username</th>
        <th>Email</th>
        <th>Actions</th>
    </tr>
    {% for user in users %}
    <tr>
        <td>{{ user.username }}</td>
        <td>{{ user.email }}</td>
        <td>
            <form method="POST" action="{{ url_for('demote_user', user_id=user.id) }}">
                <button type="submit">Remove Premium</button>
            </form>
        </td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
