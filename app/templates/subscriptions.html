{% extends 'layout.html' %}

{% block content %}
<div class="subscribe-page">
    <h1>Choose Your Subscription Plan</h1>
    <div class="subscription-options">
        <div class="row">
            {% for plan in plans %}
            <div class="col-md-4 mb-4">
                <div class="card">
                    <div class="card-header">
                        <h3>{{ plan.name }}</h3>
                    </div>
                    <div class="card-body">
                        <p>{{ plan.description }}</p>
                        <p><strong>${{ plan.price }}</strong> per month</p>
                        <a href="{{ url_for('subscribe', plan_id=plan.id) }}" class="btn btn-primary">Subscribe Now</a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <h2>Purchase Extras</h2>
    <div class="extras-section">
        <form method="POST" action="{{ url_for('purchase') }}">
            <div class="form-group">
                <label for="item_type">Select Item Type</label>
                <select class="form-control" id="item_type" name="item_type" required>
                    <option value="photo">Private Photo (nn) - $20 per photo</option>
                    <option value="audio">Audio Minute - $45 per 30 minutes</option>
                    <option value="call">Hot Call - $80 per 30 minutes</option>
                    <option value="video_call">Video Call - $40 per 10 minutes</option>
                </select>
            </div>
            <div class="form-group">
                <label for="item_description">Additional Notes</label>
                <input type="text" class="form-control" id="item_description" name="item_description" placeholder="Any special requests?" />
            </div>
            <div class="form-group">
                <label for="price">Price</label>
                <input type="number" step="0.01" class="form-control" id="price" name="price" required>
            </div>
            <button type="submit" class="btn btn-primary">Purchase</button>
        </form>
    </div>
</div>
{% endblock %}
