{% extends 'layout.html' %}

{% block content %}
<div class="container mt-4">
    <h1>Manage Pages</h1>
    <a href="{{ url_for('create_page') }}" class="btn btn-success mb-3">Create New Page</a>
    <ul class="list-group">
        {% for page in pages %}
            <li class="list-group-item d-flex justify-content-between align-items-center">
                <a href="{{ url_for('edit_page', page_name=page.slug) }}">{{ page.title }}</a>
                <div>
                    <a href="{{ url_for('edit_page', page_name=page.slug) }}" class="btn btn-primary btn-sm">Edit</a>
                    <form action="{{ url_for('delete_page', page_id=page.id) }}" method="POST" style="display:inline;">
                        {{ form.hidden_tag() }}
                        <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                    </form>
                </div>
            </li>
        {% endfor %}
    </ul>
</div>
{% endblock %}
