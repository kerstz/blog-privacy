{% extends 'layout.html' %}

{% block content %}
<div class="container mt-4">
    <h1>Edit {{ page.title }}</h1>
    <form method="POST">
        <div class="form-group">
            <label for="title">Page Title</label>
            <input type="text" name="title" id="title" class="form-control" value="{{ page.title }}">
        </div>
        <div class="form-group">
            <label for="content">Page Content</label>
            <textarea name="content" id="content" rows="10" class="form-control">{{ page.content }}</textarea>
        </div>
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="{{ url_for('admin_manage_pages') }}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
